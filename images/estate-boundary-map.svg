<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760">
  <defs>
    <linearGradient id="bg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#d8e9df"/>
      <stop offset="100%" stop-color="#f4eee4"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#61716c" flood-opacity="0.22"/>
    </filter>
    <style>
      .title { font-family: Georgia, serif; font-size: 38px; fill: #1f2b27; }
      .sub { font-family: Arial, sans-serif; font-size: 17px; fill: #60706a; }
      .label { font-family: Arial, sans-serif; font-size: 15px; fill: #23302c; font-weight: 600; }
      .small { font-family: Arial, sans-serif; font-size: 13px; fill: #566560; }
      .line { fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .road { fill: none; stroke: #f6f0e8; stroke-width: 36; stroke-linecap: round; stroke-linejoin: round; }
      .road-edge { fill: none; stroke: #b4c0ba; stroke-width: 40; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="url(#bg)"/>

  <text x="70" y="62" class="title">Estate Boundary Maps</text>
  <text x="72" y="94" class="sub">Ownership parcels, rights of way, easements and shared responsibilities</text>

  <rect x="55" y="120" width="820" height="560" rx="30" fill="#f9fbfa" stroke="#c8d4ce" filter="url(#shadow)"/>
  <rect x="910" y="120" width="235" height="360" rx="24" fill="#f9fbfa" stroke="#c8d4ce" filter="url(#shadow)"/>
  <text x="930" y="90" class="sub">Illustrative Hold map layer</text>
  <text x="930" y="153" font-family="Georgia, serif" font-size="26" fill="#1f2b27">Layers</text>

  
  <path d="M140 350 C230 260, 345 245, 450 290 C555 335, 610 230, 742 285" class="road-edge"/>
  <path d="M140 350 C230 260, 345 245, 450 290 C555 335, 610 230, 742 285" class="road"/>
  <text x="250" y="270" class="small">Shared access road</text>

  <polygon points="115,160 370,145 400,315 140,330" fill="#cfe3da" stroke="#52615c" stroke-width="2"/>
  <text x="170" y="225" class="label">Parcel A</text>
  <text x="170" y="247" class="small">Main estate freehold</text>

  <polygon points="405,145 760,165 725,350 430,315" fill="#e4dcc9" stroke="#52615c" stroke-width="2"/>
  <text x="520" y="235" class="label">Parcel B</text>
  <text x="520" y="257" class="small">Third-party freeholder</text>

  <polygon points="135,370 390,345 405,600 115,615" fill="#d8dfe6" stroke="#52615c" stroke-width="2"/>
  <text x="175" y="475" class="label">North Car Park</text>
  <text x="175" y="497" class="small">Split ownership</text>

  <polygon points="425,360 730,380 750,610 410,600" fill="#d9ead3" stroke="#52615c" stroke-width="2"/>
  <text x="510" y="480" class="label">Workshop Zone</text>
  <text x="510" y="502" class="small">Tenant repair duties</text>

  <path d="M780 140 L790 630" stroke="#9a6a55" stroke-width="12" stroke-dasharray="18 12" stroke-linecap="round"/>
  <text x="685" y="140" class="small">Ransom strip</text>

  <path d="M100 635 C250 560, 570 660, 820 585" stroke="#577b88" stroke-width="8" stroke-dasharray="14 10" fill="none"/>
  <text x="560" y="650" class="small">Historic right of way / easement</text>


  
        <g>
          <rect x="930" y="120" width="18" height="18" rx="4" fill="#cfe3da" stroke="#52615c" stroke-width="1"/>
          <text x="960" y="134" font-family="Georgia, serif" font-size="17" fill="#24312d">Main estate freehold</text>
        </g>
        <g>
          <rect x="930" y="154" width="18" height="18" rx="4" fill="#e4dcc9" stroke="#52615c" stroke-width="1"/>
          <text x="960" y="168" font-family="Georgia, serif" font-size="17" fill="#24312d">Third-party freeholder</text>
        </g>
        <g>
          <rect x="930" y="188" width="18" height="18" rx="4" fill="#d8dfe6" stroke="#52615c" stroke-width="1"/>
          <text x="960" y="202" font-family="Georgia, serif" font-size="17" fill="#24312d">Shared / split ownership</text>
        </g>
        <g>
          <rect x="930" y="222" width="18" height="18" rx="4" fill="#d9ead3" stroke="#52615c" stroke-width="1"/>
          <text x="960" y="236" font-family="Georgia, serif" font-size="17" fill="#24312d">Tenant responsibility zone</text>
        </g>
        <g>
          <rect x="930" y="256" width="18" height="18" rx="4" fill="#9a6a55" stroke="#52615c" stroke-width="1"/>
          <text x="960" y="270" font-family="Georgia, serif" font-size="17" fill="#24312d">Ransom strip</text>
        </g>
        <g>
          <rect x="930" y="290" width="18" height="18" rx="4" fill="#577b88" stroke="#52615c" stroke-width="1"/>
          <text x="960" y="304" font-family="Georgia, serif" font-size="17" fill="#24312d">Right of way / easement</text>
        </g>

  <text x="70" y="720" class="small">Hold — spatial governance mock map for estate records. Illustrative only.</text>
</svg>
